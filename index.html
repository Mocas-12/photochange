<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhotoChange</title>
    <link rel="stylesheet" href="./style.css" />
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">PhotoChange</div>
      <div class="subtitle">上传、裁剪、调整、转换</div>
    </header>
    <main class="app-main">
      <section class="left">
        <div id="dropzone" class="dropzone">
          <input id="fileInput" type="file" accept="image/*" />
          <div class="dz-inner">
            <div class="dz-title">拖拽图片到此处或点击选择</div>
            <div class="dz-hint">支持 PNG / JPG / JPEG / WebP / BMP</div>
            <button id="chooseBtn" class="btn primary">选择图片</button>
          </div>
        </div>
        <div class="display-main-container">
          <div id="image-tools" class="image-tools-fixed">
            <button onclick="changeZoom(-0.1)">-</button>
            <span class="zoom-text" id="zoom-text">100%</span>
            <button onclick="changeZoom(0.1)">+</button>
            <div class="v-line"></div>
            <button onclick="rotateImage(-90)" title="逆时针旋转">↺</button>
            <button onclick="rotateImage(90)" title="顺时针旋转">↻</button>
            <button id="gridBtn" onclick="toggleGrid()">标尺</button>
          </div>
          <div class="canvas-wrap grid-on">
            <canvas id="canvas"></canvas>
            <div id="infoBadge" class="badge hidden">未加载</div>
          </div>
        </div>
      </section>
      <section class="right">
        <div class="panel">
          <div class="panel-title">裁剪</div>
          <div class="row">
            <label for="aspectSelect">长宽比</label>
            <select id="aspectSelect">
              <option value="free">自由</option>
              <option value="1:1">1:1</option>
              <option value="4:3">4:3</option>
              <option value="16:9">16:9</option>
              <option value="3:2">3:2</option>
            </select>
          </div>
          <div class="row">
            <button id="cropBtn" class="btn">裁剪选区</button>
            <button id="resetBtn" class="btn ghost">重置</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">尺寸</div>
          <div class="row">
            <label for="widthInput">宽度</label>
            <input id="widthInput" class="dimension-input" type="number" min="1" step="1" />
          </div>
          <div class="row">
            <label for="heightInput">高度</label>
            <input id="heightInput" class="dimension-input" type="number" min="1" step="1" />
          </div>
          <div class="row">
            <label class="switch">
              <input id="lockRatio" type="checkbox" checked />
              <span>锁定比例</span>
            </label>
            <button id="applyResize" class="btn">应用尺寸</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">导出</div>
          <div class="row">
            <label for="formatSelect">格式</label>
            <select id="formatSelect">
              <option value="png">PNG</option>
              <option value="jpg">JPG</option>
              <option value="pdf">PDF</option>
            </select>
          </div>
          <div class="row jpg-only hidden">
            <label for="qualityRange">JPG质量</label>
            <input id="qualityRange" type="range" min="0.1" max="1" step="0.05" value="0.92" />
            <span id="qualityValue">0.92</span>
          </div>
          <div class="row">
            <input id="fileName" type="text" placeholder="文件名" />
          </div>
          <div class="row">
            <button id="downloadBtn" class="btn primary wide">下载</button>
          </div>
          <div id="quotaBar" class="quota-bar"><div class="quota-bar-inner" id="quotaBarInner"></div></div>
          <div id="quotaText" class="quota-text"></div>
          <div id="quotaHint" class="quota-hint hidden">提示：这是最后一次免费额度，建议立即激活专业版以防中断</div>
        </div>
      </section>
    </main>
    <div id="custom-alert" class="alert-overlay">
      <div class="alert-content">
        <p id="alert-message">请先上传并转换一张图片</p>
        <button onclick="closeAlert()" class="alert-btn">确认</button>
      </div>
    </div>
    <div class="credits footer-info">
      <img src="https://github.com/Mocas-12.png" class="github-avatar" alt="Avatar" />
      <div class="footer-text">
        <span>作者：Unlimited Box</span>
        <span>邮箱：a18577y@gmail.com</span>
      </div>
    </div>
    <div id="proModal" class="modal-overlay hidden">
      <div class="modal">
        <button id="closeX" class="modal-close-btn" onclick="closeProModal()">×</button>
        <div id="activation-form">
          <h3>额度已用尽</h3>
          <p>您已达到免费下载额度。请开通专业版以解锁无限下载次数！</p>
          <div class="row">
            <input id="activateInput" type="text" placeholder="输入激活码" />
          </div>
          <div class="actions">
            <button id="activateBtn" class="btn primary">激活</button>
            <button id="closeModal" class="btn ghost" onclick="closeProModal()">稍后再说</button>
          </div>
          <div class="activation-footer">
            <button class="get-code-btn" onclick="window.open('https://mbd.pub/o/bread/mbd-YZWblJ9paA==','_blank')">还没有激活码？点击获取</button>
          </div>
        </div>
        <!-- activation-modal removed per new purchase flow -->
      </div>
    </div>
    <footer class="bz-footer">
      <div class="busuanzi-container">
        <span id="busuanzi_container_site_pv">总访问量 <span id="busuanzi_value_site_pv"></span></span>
        <span class="sep" id="busuanzi_sep" style="display:none">|</span>
        <span id="busuanzi_container_site_uv">访客数 <span id="busuanzi_value_site_uv"></span></span>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="./expose.js"></script>
    <script src="./main.js"></script>
    <script src="./overlay-fix.js"></script>
    <script>
      (function(){
        function showAlert(msg){
          var m=document.getElementById('alert-message');
          var ov=document.getElementById('custom-alert');
          if(m) m.innerText=String(msg);
          if(ov) ov.style.display='flex';
        }
        function closeAlert(){
          var ov=document.getElementById('custom-alert');
          if(ov) ov.style.display='none';
        }
        window.showAlert=showAlert;
        window.closeAlert=closeAlert;
        window.alert=function(msg){showAlert(msg)};
      })();
    </script>
    <script src="./quota.js"></script>
    <script src="./info-badge.js"></script>
    <script>
      (function(){
        var tools=document.getElementById('image-tools');
        var canvas=document.getElementById('canvas');
        var zoomText=document.getElementById('zoom-text');
        var gridBtn=document.getElementById('gridBtn');
        if(!tools||!canvas||!zoomText) return;
        var __zoom=1, __angle=0;
        function applyTransform(){
          canvas.style.setProperty('--zoom-level', String(__zoom));
          canvas.style.setProperty('--rotation-angle', __angle + 'deg');
          zoomText.textContent = Math.round(__zoom*100) + '%';
        }
        function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
        window.changeZoom=function(delta){__zoom=clamp(__zoom+delta,0.2,4);applyTransform()};
        window.rotateImage=function(deg){__angle=(__angle+deg)%360;window.currentRotation=__angle;applyTransform()};
        window.toggleGrid=function(){
          var wrap=canvas.parentElement;
          var on=wrap.classList.toggle('grid-on');
          if(gridBtn){gridBtn.classList.toggle('active',on)}
        };
        applyTransform();
        (function(){
          try{
            var on=canvas.parentElement.classList.contains('grid-on');
            if(gridBtn){gridBtn.classList.toggle('active',on)}
          }catch(_){}
        })();
        function showTools(){tools.style.display='flex'}
        function hideTools(){tools.style.display='none'}
        var fileInput=document.getElementById('fileInput');
        var dropzone=document.getElementById('dropzone');
        var resetBtn=document.getElementById('resetBtn');
        if(fileInput){fileInput.addEventListener('change',function(){showTools()})}
        if(dropzone){dropzone.addEventListener('drop',function(){showTools()})}
        if(resetBtn){resetBtn.addEventListener('click',function(){hideTools()})}
        if(window.ResizeObserver){
          var ro=new ResizeObserver(function(entries){
            if(entries&&entries[0]&&entries[0].contentRect){
              var cr=entries[0].contentRect;
              if(cr.width>0&&cr.height>0){showTools()}
            }
          });
          ro.observe(canvas);
        }
      })();
    </script>
    <script>
      (function(){
        function makeRotatedCanvas(src, angle){
          var a=((angle%360)+360)%360;
          var isV=Math.abs(a%180)===90;
          var w=isV?src.height:src.width;
          var h=isV?src.width:src.height;
          var cv=document.createElement('canvas');
          cv.width=w;cv.height=h;
          var c=cv.getContext('2d');
          c.translate(w/2,h/2);
          c.rotate(a*Math.PI/180);
          c.drawImage(src,-src.width/2,-src.height/2);
          return cv;
        }
        function nameBase(){
          var v=document.getElementById('fileName');
          var s=(v&&v.value||'output').replace(/[\\/:*?"<>|]+/g,'').trim()||'output';
          return s;
        }
        function trigger(blob,ext){
          var url=URL.createObjectURL(blob);
          var a=document.createElement('a');
          a.href=url;a.download=nameBase()+'.'+ext;
          document.body.appendChild(a);a.click();a.remove();
          URL.revokeObjectURL(url);
        }
        document.addEventListener('DOMContentLoaded',function(){
          var btn=document.getElementById('downloadBtn');
          if(!btn) return;
          btn.addEventListener('click',function(e){
            try{
              var src=window.__pc_lastSrcCanvas;
              if(!src||!(src.width>0&&src.height>0)) return;
              var angle=window.currentRotation||0;
              var cv=makeRotatedCanvas(src,angle);
              var sel=document.getElementById('formatSelect');
              var fmt=(sel&&sel.value)||'png';
              if(fmt==='png'){
                cv.toBlob(function(b){if(b)trigger(b,'png')},"image/png");
              }else if(fmt==='jpg'){
                var qEl=document.getElementById('qualityRange');
                var q=Math.max(0.1,Math.min(1,Number(qEl&&qEl.value||0.92)));
                cv.toBlob(function(b){if(b)trigger(b,'jpg')},"image/jpeg",q);
              }else{
                var data=cv.toDataURL('image/jpeg',0.92);
                var pdf=new window.jspdf.jsPDF({unit:"pt",format:"a4"});
                var pageW=pdf.internal.pageSize.getWidth();
                var pageH=pdf.internal.pageSize.getHeight();
                var r=Math.min(pageW/cv.width,pageH/cv.height);
                var w=cv.width*r;var h=cv.height*r;
                var x=(pageW-w)/2;var y=(pageH-h)/2;
                pdf.addImage(data,"JPEG",x,y,w,h,"","FAST");
                var blob=pdf.output("blob");
                trigger(blob,"pdf");
              }
              e.stopImmediatePropagation();e.preventDefault();
            }catch(_){}
          },true);
        });
      })();
    </script>
    <script>
      (function(){
        function visible(el){if(!el)return false;const s=getComputedStyle(el);return s.display!=='none'&&s.visibility!=='hidden'}
        function ensureVisible(){
          const pvC=document.getElementById('busuanzi_container_site_pv');
          const uvC=document.getElementById('busuanzi_container_site_uv');
          const pvV=document.getElementById('busuanzi_value_site_pv');
          const uvV=document.getElementById('busuanzi_value_site_uv');
          if(pvC){pvC.style.display='inline'}
          if(uvC){uvC.style.display='inline'}
          if(pvV&&(!pvV.textContent||pvV.textContent.trim()==='')){pvV.textContent='加载中...'}
          if(uvV&&(!uvV.textContent||uvV.textContent.trim()==='')){uvV.textContent='加载中...'}
        }
        function finalizeFallback(){
          const pvV=document.getElementById('busuanzi_value_site_pv');
          const uvV=document.getElementById('busuanzi_value_site_uv');
          if(pvV&&pvV.textContent==='加载中...'){pvV.textContent='暂不可用'}
          if(uvV&&uvV.textContent==='加载中...'){uvV.textContent='暂不可用'}
        }
        function updateSep(){
          const pv=document.getElementById('busuanzi_container_site_pv');
          const uv=document.getElementById('busuanzi_container_site_uv');
          const sep=document.getElementById('busuanzi_sep');
          if(!sep)return;
          sep.style.display = (visible(pv)&&visible(uv)) ? 'inline' : 'none';
        }
        const pv=document.getElementById('busuanzi_container_site_pv');
        const uv=document.getElementById('busuanzi_container_site_uv');
        const obsCfg={attributes:true,attributeFilter:['style','class']};
        if(pv){new MutationObserver(function(){ensureVisible();updateSep()}).observe(pv,obsCfg)}
        if(uv){new MutationObserver(function(){ensureVisible();updateSep()}).observe(uv,obsCfg)}
        document.addEventListener('DOMContentLoaded',function(){ensureVisible();updateSep()});
        window.addEventListener('load',function(){ensureVisible();updateSep()});
        setTimeout(function(){ensureVisible();updateSep()},1200);
        setTimeout(finalizeFallback,5000);
      })();
    </script>
  </body>
  </html>
